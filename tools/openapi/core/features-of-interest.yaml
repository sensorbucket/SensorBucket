get:
  x-is-paginated: true
  operationId: ListFeaturesOfInterest
  summary: List features of interest
  description: |
    Fetch a list of features of interest.
  tags: ["Core"]
  parameters:
    - in: query
      name: cursor
      description: The cursor for the current page
      schema:
        type: string
    - in: query
      name: limit
      description: |
        The maximum amount of items per page. Not applicable if `cursor` parameter is given. System limits are in place.
      schema:
        type: integer
    - in: query
      name: name
      description: Used to filter features by their name.
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
    - in: query
      name: properties
      description: Used to filter features by its properties. This filters devices on whether their property contains the provided value. The value must be a JSON string and depending on your client should be URL Escaped
      required: false
      schema:
        type: string
        example: '{ "external_id": "1122" }'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../responses.yaml#/paginatedResponse'
              - type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: 'schemas.yaml#/featureOfInterest'
    '401':
      $ref: '../responses.yaml#/401'
    '403':
      $ref: '../responses.yaml#/403'

post:
  operationId: CreateFeatureOfInterest
  summary: Create FeatureOfInterest
  description: |
    Create a new FeatureOfInterest.
  tags: ["Core"]
  requestBody: 
    content:
      application/json:
        schema:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              example: FeatureName
            description:
              type: string
            encoding_type:
              type: string
              example: application/geo+json
            feature:
              type: object
            properties:
              type: object
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            type: object
            required:
              - message
              - data
            properties:
              message:
                type: string
                example: created feature of interest
              data:
                $ref: 'schemas.yaml#/featureOfInterest'
    '401':
      $ref: '../responses.yaml#/401'
    '403':
      $ref: '../responses.yaml#/403'
